name: Build iOS App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'simulator'
        type: choice
        options:
          - simulator
          - archive

jobs:
  build-simulator:
    runs-on: macos-latest
    if: github.event.inputs.build_type != 'archive'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Resolve Swift Packages
      working-directory: ./ios/App
      run: xcodebuild -project App.xcodeproj -scheme App -resolvePackageDependencies

    - name: Build iOS Simulator
      working-directory: ./ios/App
      run: |
        xcodebuild \
          -project App.xcodeproj \
          -scheme App \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          clean build \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Simulator Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-simulator-build
        path: |
          ios/App/build/Build/Products/*-iphonesimulator/*.app
        retention-days: 7

  build-archive:
    runs-on: macos-latest
    if: github.event.inputs.build_type == 'archive' || github.event_name == 'push'
    env:
      P12_PASSWORD: kaidi
      KEYCHAIN_PASSWORD: kaidi

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Sync Capacitor iOS
      run: npx cap sync ios

    - name: Resolve Swift Packages
      working-directory: ./ios/App
      run: xcodebuild -project App.xcodeproj -scheme App -resolvePackageDependencies

    - name: Install Apple Certificate
      run: |
        # Create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain

        # Decode and import p12
        openssl base64 -d -in cert/ios_dev.p12.b64 -out /tmp/certificate.p12
        security import /tmp/certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A -t cert -f pkcs12
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

    - name: Install Provisioning Profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp cert/SmartHome_Control.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

    - name: Build iOS Archive
      working-directory: ./ios/App
      run: |
        xcodebuild \
          -project App.xcodeproj \
          -scheme App \
          -sdk iphoneos \
          clean archive \
          -archivePath build/App.xcarchive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="iPhone Developer: zhiyun zong (K3H87YGH8J)" \
          PROVISIONING_PROFILE_SPECIFIER="SmartHome Control Provisioning Profile" \
          DEVELOPMENT_TEAM=AVAA63GHH3

    - name: Export IPA
      working-directory: ./ios/App
      run: |
        cat > exportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>AVAA63GHH3</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.smarthome.control</key>
                <string>SmartHome Control Provisioning Profile</string>
            </dict>
        </dict>
        </plist>
        EOF

        xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportPath build/Exported \
          -exportOptionsPlist exportOptions.plist

    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: ios-archive
        path: |
          ios/App/build/App.xcarchive
        retention-days: 7

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: |
          ios/App/build/Exported/*.ipa
        retention-days: 7
